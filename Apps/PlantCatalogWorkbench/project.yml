name: PlantCatalogWorkbench
options:
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: nl.tientijd.PlantCatalogWorkbench
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 15.0
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: ""
targets:
  PlantCatalogWorkbench:
    type: application
    platform: macOS
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        shell: /bin/zsh
        script: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: SwiftLint is not installed. Install it with: brew install swiftlint"
            exit 1
          fi

          swiftlint lint --strict --config ../../.swiftlint.yml
    sources:
      - path: src
        excludes:
          - "**/*.md"
    resources:
      - path: resources
    settings:
      base:
        PRODUCT_NAME: PlantCatalogWorkbench
        INFOPLIST_KEY_CFBundleDisplayName: Plant Catalog Workbench
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright 2026 TienTijd
  PlantCatalogWorkbenchTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: tests/Unit
        excludes:
          - "**/*.md"
    dependencies:
      - target: PlantCatalogWorkbench
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  PlantCatalogWorkbench:
    build:
      targets:
        PlantCatalogWorkbench: all
        PlantCatalogWorkbenchTests: [test]
    test:
      targets:
        - name: PlantCatalogWorkbenchTests
