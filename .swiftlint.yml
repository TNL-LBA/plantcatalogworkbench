included:
  - Apps/PlantCatalogWorkbench/src
  - Apps/PlantCatalogWorkbench/tests

excluded:
  - Apps/PlantCatalogWorkbench/.build
  - Apps/PlantCatalogWorkbench/build
  - Apps/PlantCatalogWorkbench/DerivedData
  - Apps/PlantCatalogWorkbench/resources
  - Apps/PlantCatalogWorkbench/data

cache_path: .swiftlint-cache

analyzer_rules:
  - explicit_self
  - unused_declaration
  - unused_import

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_direct_init
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - file_header
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - function_default_parameter_at_end
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_objc_type
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - static_operator
  - strict_fileprivate
  - switch_case_alignment
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - todo

custom_rules:
  no_print_statements:
    name: "No Print Statements"
    regex: "\\bprint\\s*\\("
    message: "Use Logger instead of print(...) in production code."
    severity: error
  no_nslog_statements:
    name: "No NSLog Statements"
    regex: "\\bNSLog\\s*\\("
    message: "Use Logger instead of NSLog(...)."
    severity: error
  no_legacy_os_log_statements:
    name: "No Legacy os_log"
    regex: "\\bos_log\\s*\\("
    message: "Prefer Logger over legacy os_log(...)."
    severity: warning

file_length:
  warning: 600
  error: 900

type_body_length:
  warning: 500
  error: 500

function_body_length:
  warning: 60
  error: 100

line_length:
  warning: 140
  error: 180
  ignores_comments: false
  ignores_urls: true
  ignores_interpolated_strings: false

identifier_name:
  min_length:
    warning: 3
    error: 2
  excluded:
    - id
    - db
    - ui
    - x
    - y
  validates_start_with_lowercase: true

type_name:
  min_length:
    warning: 3
  max_length:
    warning: 50
    error: 60

large_tuple:
  warning: 3
  error: 4

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 2

cyclomatic_complexity:
  warning: 10
  error: 15
  ignores_case_statements: true

file_header:
  required_pattern: |
    \/\/
    \/\/  .*\.swift
    \/\/  .*
    \/\/  Plant Catalog Workbench
    \/\/
    \/\/  Created by .*
    \/\/  Copyright.*

reporter: "xcode"
